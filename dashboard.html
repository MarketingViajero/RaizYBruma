<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raíz y Bruma — Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap');

:root {
  --brown:    #2D1B0E;
  --cream:    #F5E6C8;
  --cream2:   #FDF6EC;
  --gold:     #C8922A;
  --gold-lt:  #F0D9A8;
  --amber:    #7B3F00;
  --green:    #4A6741;
  --indigo:   #3B4A6B;
  --midnight: #1C1C2E;
  --muted:    #8B7355;
  --bg:       #FAF6EE;
  --border:   rgba(200,146,42,.16);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--brown);font-family:'Inter',sans-serif;min-height:100vh;}

/* ── HEADER ── */
header{background:var(--brown);padding:32px 40px 24px;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%,rgba(200,146,42,.18),transparent 65%);pointer-events:none;}
.hi{max-width:1200px;margin:0 auto;position:relative;}
.brand h1{font-family:'Cormorant Garamond',serif;color:var(--cream);font-size:2.1rem;font-weight:300;letter-spacing:.12em;}
.brand p{font-size:.75rem;color:var(--gold);letter-spacing:.22em;text-transform:uppercase;margin-top:4px;}

/* ── KPIs ── */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;max-width:1200px;margin:28px auto 0;padding:0 24px;}
.kpi{background:#fff;border-radius:14px;padding:18px 20px;border:1px solid var(--border);box-shadow:0 2px 12px rgba(45,27,14,.06);}
.kpi-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);font-weight:500;}
.kpi-value{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:600;color:var(--brown);margin-top:5px;line-height:1;}
.kpi-sub{font-size:.7rem;color:var(--muted);margin-top:4px;}

/* ── WINNER ── */
.winner-wrap{max-width:1200px;margin:24px auto 0;padding:0 24px;}
.winner{background:linear-gradient(135deg,var(--brown) 0%,#5C3010 60%,var(--amber) 100%);border-radius:16px;padding:22px 28px;display:flex;align-items:center;gap:20px;box-shadow:0 6px 28px rgba(45,27,14,.22);position:relative;overflow:hidden;}
.winner::after{content:'✦';position:absolute;right:28px;top:50%;transform:translateY(-50%);font-size:5rem;opacity:.08;color:var(--gold);pointer-events:none;}
.winner-crown{font-size:2.2rem;flex-shrink:0;}
.winner-info{flex:1;}
.winner-tag{font-size:.67rem;text-transform:uppercase;letter-spacing:.2em;color:var(--gold);font-weight:500;}
.winner-name{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;color:var(--cream);margin-top:2px;}
.winner-stats{display:flex;gap:24px;margin-top:8px;flex-wrap:wrap;}
.ws-label{font-size:.67rem;color:rgba(245,230,200,.6);text-transform:uppercase;letter-spacing:.12em;}
.ws-val{font-size:1.05rem;font-weight:600;color:var(--cream);margin-top:1px;}

/* ── FILTERS ── */
.filters-wrap{max-width:1200px;margin:24px auto 0;padding:0 24px;}
.filters-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.filters-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);font-weight:500;margin-right:4px;}
.filter-btn{padding:7px 16px;border-radius:99px;border:1.5px solid rgba(139,115,85,.2);font-family:'Inter',sans-serif;font-size:.76rem;font-weight:500;cursor:pointer;background:#fff;color:var(--muted);transition:all .2s;}
.filter-btn:hover{border-color:var(--gold);color:var(--brown);}
.filter-btn.active{background:var(--brown);color:var(--cream);border-color:var(--brown);}
.filter-btn.active.f-joyas{background:var(--amber);border-color:var(--amber);}
.filter-btn.active.f-elixir{background:var(--green);border-color:var(--green);}
.filter-btn.active.f-hogar{background:var(--indigo);border-color:var(--indigo);}
.filter-btn.active.f-secreto{background:var(--midnight);border-color:var(--midnight);}
.sort-wrap{margin-left:auto;display:flex;align-items:center;gap:8px;}
.sort-wrap label{font-size:.72rem;color:var(--muted);}
select{font-family:'Inter',sans-serif;font-size:.76rem;padding:7px 12px;border:1.5px solid rgba(139,115,85,.2);border-radius:8px;background:#fff;color:var(--brown);cursor:pointer;outline:none;}
select:focus{border-color:var(--gold);}

/* ── GRID ── */
.grid{max-width:1200px;margin:20px auto 60px;padding:0 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(276px,1fr));gap:18px;}

/* ── CARD ── */
.card{background:#fff;border-radius:18px;border:1px solid var(--border);box-shadow:0 2px 14px rgba(45,27,14,.06);overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:transform .2s,box-shadow .2s;}
.card:hover{transform:translateY(-5px);box-shadow:0 12px 32px rgba(45,27,14,.13);}
.card.hidden{display:none;}
.card-stripe{height:4px;}
.card-stripe.joyas{background:var(--amber);}
.card-stripe.elixir{background:var(--green);}
.card-stripe.hogar{background:var(--indigo);}
.card-stripe.secreto{background:var(--midnight);}
.card-img-wrap{width:100%;aspect-ratio:4/3;overflow:hidden;position:relative;background:var(--cream2);}
.card-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s cubic-bezier(.4,0,.2,1);}
.card:hover .card-img-wrap img{transform:scale(1.05);}
.card-img-overlay{position:absolute;bottom:0;left:0;right:0;height:50%;background:linear-gradient(to top,rgba(45,27,14,.4),transparent);pointer-events:none;}
.coll-badge{position:absolute;top:10px;left:10px;font-size:.64rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:3px 9px;border-radius:99px;color:#fff;}
.coll-badge.joyas{background:rgba(123,63,0,.85);}
.coll-badge.elixir{background:rgba(74,103,65,.85);}
.coll-badge.hogar{background:rgba(59,74,107,.85);}
.coll-badge.secreto{background:rgba(28,28,46,.85);}
.stock-badge{position:absolute;top:10px;right:10px;font-size:.64rem;font-weight:700;padding:3px 9px;border-radius:99px;color:#fff;background:rgba(45,27,14,.75);}
.stock-badge.low{background:rgba(180,60,40,.85);}
.stock-badge.zero{background:rgba(120,120,120,.85);}
.card-body{padding:16px 18px 14px;flex:1;display:flex;flex-direction:column;}
.card-name{font-family:'Cormorant Garamond',serif;font-size:1.28rem;font-weight:600;color:var(--brown);line-height:1.2;margin-bottom:3px;}
.card-note{font-size:.71rem;color:var(--muted);line-height:1.45;margin-bottom:14px;flex:1;}
.card-prices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.price-box{background:var(--cream2);border-radius:9px;padding:9px 11px;}
.price-box .pb-label{font-size:.63rem;text-transform:uppercase;letter-spacing:.11em;color:var(--muted);font-weight:500;}
.price-box .pb-val{font-size:.95rem;font-weight:600;color:var(--brown);margin-top:2px;}
.price-box.hl{background:linear-gradient(135deg,#FDF0D5,#FAE8BE);}
.price-box.hl .pb-val{color:var(--amber);}
.margin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.margin-label{font-size:.67rem;text-transform:uppercase;letter-spacing:.11em;color:var(--muted);font-weight:500;}
.margin-pct{font-size:.85rem;font-weight:700;color:var(--brown);}
.margin-bar-bg{background:var(--cream2);border-radius:99px;height:6px;overflow:hidden;}
.margin-bar-fill{height:100%;border-radius:99px;}
.margin-bar-fill.joyas{background:linear-gradient(90deg,var(--amber),#D4834A);}
.margin-bar-fill.elixir{background:linear-gradient(90deg,var(--green),#7AB873);}
.margin-bar-fill.hogar{background:linear-gradient(90deg,var(--indigo),#6B7EB5);}
.margin-bar-fill.secreto{background:linear-gradient(90deg,var(--midnight),#4A4A6B);}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);font-size:.7rem;color:var(--muted);}
.card-footer strong{color:var(--brown);}
.winner-chip{padding:3px 9px;border-radius:99px;font-size:.66rem;font-weight:600;background:linear-gradient(90deg,#C8922A,#E8B048);color:#fff;}
.ventas-chip{padding:3px 9px;border-radius:99px;font-size:.66rem;font-weight:600;background:var(--cream2);color:var(--muted);}
.ventas-chip.has{background:#EAF3E8;color:var(--green);}

/* ── PRODUCT MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(30,15,5,.55);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:22px;width:100%;max-width:960px;box-shadow:0 24px 80px rgba(30,15,5,.28);overflow:hidden;position:relative;margin:auto;}
.modal-header{display:flex;align-items:stretch;gap:0;background:var(--brown);min-height:160px;}
.modal-img{width:200px;flex-shrink:0;overflow:hidden;}
.modal-img img{width:100%;height:100%;object-fit:cover;display:block;}
.modal-info{flex:1;padding:24px 28px;display:flex;flex-direction:column;justify-content:center;}
.modal-coll{font-size:.68rem;text-transform:uppercase;letter-spacing:.18em;color:var(--gold);font-weight:500;margin-bottom:6px;}
.modal-name{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;color:var(--cream);line-height:1.1;}
.modal-meta{display:flex;gap:20px;margin-top:14px;flex-wrap:wrap;}
.mm-item .mm-l{font-size:.64rem;text-transform:uppercase;letter-spacing:.12em;color:rgba(245,230,200,.55);}
.mm-item .mm-v{font-size:1rem;font-weight:600;color:var(--cream);margin-top:1px;}
.mm-item .mm-v.stock-low{color:#F4A460;}
.mm-item .mm-v.stock-zero{color:#aaa;}
.modal-close{position:absolute;top:16px;right:18px;background:rgba(255,255,255,.12);border:none;color:var(--cream);font-size:1.2rem;width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;z-index:10;}
.modal-close:hover{background:rgba(255,255,255,.22);}

/* modal body */
.modal-body{padding:24px 28px;}
.modal-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-section-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;color:var(--brown);}
.btn-primary{padding:9px 20px;background:var(--brown);color:var(--cream);border:none;border-radius:9px;font-family:'Inter',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:background .2s;letter-spacing:.02em;}
.btn-primary:hover{background:var(--amber);}
.btn-sm{padding:5px 12px;font-size:.7rem;border-radius:7px;font-family:'Inter',sans-serif;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all .2s;}
.btn-danger{background:#FFF0EE;color:#C0392B;border-color:#F5C6C2;}
.btn-danger:hover{background:#C0392B;color:#fff;}

/* sales table */
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-state .es-icon{font-size:2.8rem;margin-bottom:10px;}
.empty-state p{font-size:.85rem;line-height:1.6;}
.tbl-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:.78rem;}
thead th{background:var(--brown);color:var(--cream);padding:10px 14px;text-align:left;font-weight:500;font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;white-space:nowrap;}
thead th:first-child{border-radius:12px 0 0 0;}
thead th:last-child{border-radius:0 12px 0 0;}
tbody tr{border-bottom:1px solid var(--border);}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:#FFFBF5;}
tbody td{padding:10px 14px;vertical-align:middle;color:var(--brown);}
td.muted{color:var(--muted);}
.status-badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:.67rem;font-weight:600;white-space:nowrap;}
.s-recibido{background:#EEF2FF;color:#3B4A6B;}
.s-preparacion{background:#FFF8E6;color:#A07020;}
.s-enviado{background:#E8F0FE;color:#1A56A8;}
.s-entregado{background:#EAF3E8;color:#2E7D32;}
.s-cancelado{background:#FEEEEE;color:#C62828;}
.status-sel{font-family:'Inter',sans-serif;font-size:.7rem;padding:3px 8px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--brown);cursor:pointer;outline:none;}
.status-sel:focus{border-color:var(--gold);}

/* ── FORM MODAL ── */
.form-overlay{position:fixed;inset:0;background:rgba(30,15,5,.6);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.form-overlay.open{display:flex;}
.form-modal{background:#fff;border-radius:20px;width:100%;max-width:560px;box-shadow:0 20px 60px rgba(30,15,5,.28);overflow:hidden;}
.form-header{background:var(--brown);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;}
.form-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:var(--cream);}
.form-close{background:rgba(255,255,255,.12);border:none;color:var(--cream);font-size:1.1rem;width:30px;height:30px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.form-close:hover{background:rgba(255,255,255,.22);}
.form-body{padding:22px 24px;display:grid;grid-template-columns:1fr 1fr;gap:14px 16px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full{grid-column:1/-1;}
.form-group label{font-size:.72rem;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.form-group input,.form-group select,.form-group textarea{font-family:'Inter',sans-serif;font-size:.85rem;padding:9px 12px;border:1.5px solid rgba(139,115,85,.2);border-radius:9px;outline:none;color:var(--brown);background:#fff;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold);}
.form-group textarea{resize:vertical;min-height:60px;}
.form-footer{padding:0 24px 22px;display:flex;gap:10px;justify-content:flex-end;}
.btn-secondary{padding:9px 20px;background:var(--cream2);color:var(--brown);border:1.5px solid var(--border);border-radius:9px;font-family:'Inter',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .2s;}
.btn-secondary:hover{border-color:var(--gold);}

/* ── TABS ── */
.tabs-wrap{max-width:1200px;margin:24px auto 0;padding:0 24px;}
.tabs{display:flex;gap:4px;background:#fff;border-radius:14px;padding:5px;border:1px solid var(--border);width:fit-content;box-shadow:0 2px 10px rgba(45,27,14,.05);}
.tab-btn{padding:9px 24px;border-radius:10px;border:none;font-family:'Inter',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;color:var(--muted);background:transparent;transition:all .2s;display:flex;align-items:center;gap:7px;}
.tab-btn:hover{color:var(--brown);}
.tab-btn.active{background:var(--brown);color:var(--cream);box-shadow:0 2px 8px rgba(45,27,14,.2);}

/* ── EMAIL HUB ── */
.email-wrap{max-width:1200px;margin:0 auto 60px;padding:0 24px;display:none;}
.email-wrap.visible{display:block;}

.email-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px;}

.email-section-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:var(--brown);margin-bottom:16px;}

/* template cards */
.templates-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;margin-bottom:36px;}
.tpl-card{background:#fff;border-radius:18px;border:1px solid var(--border);box-shadow:0 2px 12px rgba(45,27,14,.06);overflow:hidden;}
.tpl-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;}
.tpl-icon{font-size:1.8rem;flex-shrink:0;}
.tpl-title{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:600;color:var(--brown);}
.tpl-desc{font-size:.73rem;color:var(--muted);margin-top:2px;}
.tpl-trigger{font-size:.67rem;text-transform:uppercase;letter-spacing:.12em;font-weight:600;padding:2px 9px;border-radius:99px;margin-top:5px;display:inline-block;}
.tpl-trigger.t-compra{background:#EAF3E8;color:var(--green);}
.tpl-trigger.t-envio{background:#E8F0FE;color:#1A56A8;}
.tpl-trigger.t-llegada{background:#EEF2FF;color:var(--indigo);}
.tpl-trigger.t-encuesta{background:var(--gold-lt);color:var(--amber);}

.tpl-preview{padding:16px 22px;background:var(--cream2);margin:0;font-size:.78rem;color:var(--brown);line-height:1.7;max-height:140px;overflow:hidden;position:relative;}
.tpl-preview::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent,var(--cream2));pointer-events:none;}

.tpl-footer{padding:14px 22px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.tpl-recipient-info{font-size:.72rem;color:var(--muted);flex:1;}
.tpl-recipient-info strong{color:var(--brown);}
.btn-gmail{padding:8px 16px;background:#EA4335;color:#fff;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:.76rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .2s;text-decoration:none;}
.btn-gmail:hover{background:#c5372a;}
.btn-copy-tpl{padding:8px 14px;background:var(--cream2);color:var(--brown);border:1.5px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;font-size:.76rem;font-weight:500;cursor:pointer;transition:all .2s;}
.btn-copy-tpl:hover{border-color:var(--gold);}

/* filter chips for recipients */
.recipient-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.rec-chip{padding:5px 14px;border-radius:99px;font-size:.73rem;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--muted);transition:all .2s;}
.rec-chip:hover{border-color:var(--gold);color:var(--brown);}
.rec-chip.active{background:var(--brown);color:var(--cream);border-color:var(--brown);}

/* customer list */
.cust-list-wrap{background:#fff;border-radius:16px;border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 10px rgba(45,27,14,.05);}
.cust-list-header{padding:14px 20px;background:var(--brown);display:flex;align-items:center;justify-content:space-between;}
.cust-list-title{font-size:.78rem;font-weight:600;color:var(--cream);text-transform:uppercase;letter-spacing:.1em;}
.btn-copy-all{padding:6px 14px;background:rgba(255,255,255,.12);color:var(--cream);border:1px solid rgba(245,230,200,.2);border-radius:7px;font-family:'Inter',sans-serif;font-size:.72rem;cursor:pointer;transition:all .2s;}
.btn-copy-all:hover{background:rgba(255,255,255,.22);}
.cust-row{display:flex;align-items:center;gap:14px;padding:11px 20px;border-bottom:1px solid var(--border);font-size:.8rem;}
.cust-row:last-child{border-bottom:none;}
.cust-row:hover{background:#FFFBF5;}
.cust-avatar{width:32px;height:32px;border-radius:50%;background:var(--gold-lt);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.78rem;color:var(--amber);flex-shrink:0;}
.cust-name{font-weight:500;color:var(--brown);flex:1;}
.cust-email{color:var(--muted);flex:2;}
.cust-orders{font-size:.7rem;color:var(--muted);}
.cust-copy-btn{padding:4px 10px;border-radius:6px;background:var(--cream2);border:1px solid var(--border);color:var(--muted);font-size:.68rem;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.cust-copy-btn:hover{background:var(--gold-lt);color:var(--brown);}
.no-customers{text-align:center;padding:40px 20px;color:var(--muted);font-size:.85rem;}
.toast{position:fixed;bottom:28px;right:28px;background:var(--brown);color:var(--cream);padding:10px 20px;border-radius:10px;font-size:.82rem;font-weight:500;z-index:9999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}

/* ── FINANZAS ── */
.fin-wrap{max-width:1200px;margin:0 auto 60px;padding:0 24px;display:none;}
.fin-wrap.visible{display:block;}
.fin-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:24px 0 28px;}
.fin-kpi{background:#fff;border-radius:14px;padding:18px 20px;border:1px solid var(--border);box-shadow:0 2px 12px rgba(45,27,14,.06);}
.fin-kpi.positivo .kpi-value{color:#2E7D32;}
.fin-kpi.negativo .kpi-value{color:#C62828;}
.meta-bar-wrap{margin-top:8px;}
.meta-bar-bg{background:var(--cream2);border-radius:99px;height:8px;overflow:hidden;margin-top:6px;}
.meta-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green),#7AB873);transition:width .6s;}
.meta-bar-fill.over{background:linear-gradient(90deg,#C8922A,#E8B048);}
.meta-edit{font-size:.68rem;color:var(--gold);cursor:pointer;text-decoration:underline;margin-left:6px;}
.fin-cols{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:4px;}

.fin-panel-header{background:var(--brown);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.fin-panel-title{font-size:.78rem;font-weight:600;color:var(--cream);text-transform:uppercase;letter-spacing:.1em;}
.canal-chip{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.65rem;font-weight:600;}
.c-instagram{background:#FCE4EC;color:#C2185B;}
.c-whatsapp{background:#E8F5E9;color:#2E7D32;}
.c-web{background:#E8F0FE;color:#1565C0;}
.c-feria{background:#FFF8E1;color:#F57F17;}
.c-referido{background:#F3E5F5;color:#7B1FA2;}
.c-otro{background:var(--cream2);color:var(--muted);}
.gasto-row{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid var(--border);font-size:.78rem;}
.gasto-row:last-child{border-bottom:none;}
.gasto-cat{padding:3px 9px;border-radius:99px;font-size:.67rem;font-weight:600;background:var(--cream2);color:var(--muted);white-space:nowrap;}
.gasto-desc{flex:1;color:var(--brown);}
.gasto-date{color:var(--muted);font-size:.7rem;white-space:nowrap;}
.gasto-monto{font-weight:600;color:#C62828;white-space:nowrap;}
.gasto-del{padding:3px 8px;border-radius:5px;background:#FFF0EE;border:1px solid #F5C6C2;color:#C0392B;font-size:.65rem;cursor:pointer;font-family:'Inter',sans-serif;}
.canal-bar-row{display:flex;align-items:center;gap:10px;padding:8px 18px;font-size:.77rem;}
.canal-bar-label{width:110px;flex-shrink:0;color:var(--brown);}
.canal-bar-bg{flex:1;background:var(--cream2);border-radius:99px;height:8px;overflow:hidden;}
.canal-bar-f{height:100%;border-radius:99px;}
.canal-bar-val{font-weight:600;color:var(--brown);font-size:.72rem;min-width:40px;text-align:right;}

/* ── FERIAS ── */
.ferias-wrap{max-width:1200px;margin:0 auto 60px;padding:0 24px;display:none;}
.ferias-wrap.visible{display:block;}
.ferias-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;margin-top:8px;}
.feria-card{background:#fff;border-radius:18px;border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 12px rgba(45,27,14,.06);}
.feria-stripe{height:5px;background:linear-gradient(90deg,var(--amber),#D4834A);}
.feria-body{padding:18px 20px;}
.feria-name{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;color:var(--brown);}
.feria-meta{font-size:.73rem;color:var(--muted);margin-top:3px;}
.feria-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px;}
.feria-stat{background:var(--cream2);border-radius:9px;padding:8px 10px;}
.feria-stat .fs-l{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.feria-stat .fs-v{font-size:.92rem;font-weight:700;color:var(--brown);margin-top:2px;}
.feria-stat .fs-v.pos{color:#2E7D32;}
.feria-stat .fs-v.neg{color:#C62828;}
.feria-foot{padding:10px 20px 14px;display:flex;gap:8px;border-top:1px solid var(--border);margin-top:10px;}
.feria-notas{font-size:.72rem;color:var(--muted);padding:0 20px 14px;line-height:1.5;}

@media(max-width:700px){
  .kpis{grid-template-columns:repeat(2,1fr);}
  .modal-header{flex-direction:column;}
  .modal-img{width:100%;height:160px;}
  .form-body{grid-template-columns:1fr;}
  .form-group.full{grid-column:1;}
  .sort-wrap{margin-left:0;width:100%;}
  .templates-grid{grid-template-columns:1fr;}
  .email-kpis{grid-template-columns:repeat(2,1fr);}
  .fin-grid{grid-template-columns:repeat(2,1fr);}
  .fin-cols{grid-template-columns:1fr;}
}

<div class="kpis" id="kpis"></div>
<div class="winner-wrap" id="winner-wrap"></div>

<!-- Tabs -->

<script>
// ── Auth guard ───────────────────────────────────────────────────────────
if (sessionStorage.getItem('ryb_admin_session') !== 'true') {
  window.location.replace('index.html');
}
function doLogout() {
  sessionStorage.removeItem('ryb_admin_session');
  window.location.href = 'index.html';
}
window.doLogout = doLogout;

const COP = n => n===0 ? '—' : '$' + n.toLocaleString('es-CO');
const PCT = n => (n*100).toFixed(1) + '%';
const fmtDate = d => d ? new Date(d+'T12:00:00').toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric'}) : '—';
const STORAGE_KEY = 'ryb_sales_v1';

const products = [
  {id:1,  name:'Anillos Amuleto',        coll:'joyas',   collName:'Joyas Únicas',        img:'prod-joyas-anillos.png',    mat:55000,  mo:35000,  emp:8000,  pv:250000, units:5,  note:'Plata 950 + piedra semipreciosa. Promedio del rango $180k–$350k.'},
  {id:2,  name:'Collares del Sol',        coll:'joyas',   collName:'Joyas Únicas',        img:'prod-joyas-collares.png',   mat:80000,  mo:45000,  emp:10000, pv:350000, units:4,  note:'Cadena + dije en plata. Promedio del rango $260k–$480k.'},
  {id:3,  name:'Aretes',                  coll:'joyas',   collName:'Joyas Únicas',        img:'prod-joyas-aretes.png',     mat:40000,  mo:28000,  emp:7000,  pv:200000, units:6,  note:'Par de aretes en plata. Promedio del rango $140k–$280k.'},
  {id:4,  name:'Piezas a Medida',         coll:'joyas',   collName:'Joyas Únicas',        img:'prod-joyas-medida.png',     mat:180000, mo:120000, emp:15000, pv:700000, units:2,  note:'Desde $600k. Solo bajo encargo — sin stock previo.'},
  {id:5,  name:'Aceite Corporal',         coll:'elixir',  collName:'Elixir del Sol',      img:'prod-elixir-corporal.png',  mat:28000,  mo:15000,  emp:12000, pv:155000, units:12, note:'Aceites base + esenciales + frasco ámbar 100ml.'},
  {id:6,  name:'Perfume Hija del Sol',    coll:'elixir',  collName:'Elixir del Sol',      img:'prod-elixir-perfume.png',   mat:45000,  mo:20000,  emp:18000, pv:225000, units:8,  note:'Alcohol 96° + esencias + frasco spray 50ml + caja.'},
  {id:7,  name:'Sérum Facial',            coll:'elixir',  collName:'Elixir del Sol',      img:'prod-elixir-serum.png',     mat:38000,  mo:15000,  emp:15000, pv:195000, units:10, note:'Rosa mosqueta + vitamina C + gotero vidrio 30ml.'},
  {id:8,  name:'Bruma Ritual',            coll:'elixir',  collName:'Elixir del Sol',      img:'prod-elixir-bruma.png',     mat:22000,  mo:12000,  emp:10000, pv:115000, units:15, note:'Agua floral + cuarzo + spray PET 100ml.'},
  {id:9,  name:'Velas de Intención',      coll:'hogar',   collName:'Ritual de Hogar',     img:'prod-hogar-vela.png',       mat:18000,  mo:12000,  emp:8000,  pv:88000,  units:15, note:'Cera de soya + aceites + mecha + vaso vidrio + sticker.'},
  {id:10, name:'Papeles Parafinados',     coll:'hogar',   collName:'Ritual de Hogar',     img:'prod-hogar-papeles.png',    mat:10000,  mo:8000,   emp:5000,  pv:62000,  units:20, note:'Papel de algodón + parafina + diseño impreso.'},
  {id:11, name:'Kit Luna Nueva',          coll:'hogar',   collName:'Ritual de Hogar',     img:'prod-hogar-kit-luna.png',   mat:52000,  mo:18000,  emp:20000, pv:185000, units:8,  note:'Vela + papel + cristal + tarjeta de ritual.'},
  {id:12, name:'Kit de Iniciación',       coll:'hogar',   collName:'Ritual de Hogar',     img:'prod-hogar-kit-inicio.png', mat:98000,  mo:35000,  emp:35000, pv:348000, units:5,  note:'Anillo básico + aceite + vela. El kit más completo.'},
  {id:13, name:'Joya del Solsticio',      coll:'secreto', collName:'El Secreto del Sol',  img:'prod-secreto-joya.png',     mat:120000, mo:90000,  emp:25000, pv:550000, units:4,  note:'Edición limitada. Solo en solsticios. Diseño exclusivo.'},
  {id:14, name:'Ritual del Último Rayo',  coll:'secreto', collName:'El Secreto del Sol',  img:'prod-secreto-ritual.png',   mat:75000,  mo:30000,  emp:28000, pv:265000, units:5,  note:'Aceite + vela + carta astral + diario. Kit experiencial.'},
  {id:15, name:'El Diario Solar',         coll:'secreto', collName:'El Secreto del Sol',  img:'prod-secreto-diario.png',   mat:30000,  mo:8000,   emp:10000, pv:98000,  units:10, note:'Diario editorial 120 págs. Impresión offset.'},
  {id:16, name:'Membresía Hija del Sol',  coll:'secreto', collName:'El Secreto del Sol',  img:'prod-secreto-membresia.png',mat:20000,  mo:15000,  emp:8000,  pv:72000,  units:0,  note:'Precio/mes. Sin stock previo — suscripción mensual.'},
];

products.forEach(p => {
  p.costo  = p.mat + p.mo + p.emp;
  p.margen = p.pv - p.costo;
  p.pct    = p.pv > 0 ? p.margen / p.pv : 0;
});

// ── Storage ──────────────────────────────────────────────────────────────
function loadSales() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e) { return {}; }
}
function saveSales(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function getSalesForProduct(pid) {
  return (loadSales()[pid] || []);
}
function getStockRemaining(p) {
  if (p.units === 0) return null; // bajo encargo
  const sold = getSalesForProduct(p.id)
    .filter(s => s.estado !== 'Cancelado')
    .reduce((sum,s) => sum + (s.cantidad||1), 0);
  return Math.max(0, p.units - sold);
}
function getTotalVentas(pid) {
  return getSalesForProduct(pid).filter(s => s.estado !== 'Cancelado').reduce((s,v) => s+(v.cantidad||1),0);
}

// ── KPIs ─────────────────────────────────────────────────────────────────
const winner = [...products].sort((a,b) => b.margen - a.margen)[0];

function renderKPIs() {
  const allSales = loadSales();
  const totalVentas = products.reduce((s,p) => s + getTotalVentas(p.id), 0);
  const totalIngresos = products.reduce((s,p) => s + getTotalVentas(p.id)*p.pv, 0);
  const avgMargin = products.reduce((s,p)=>s+p.pct,0)/products.length;
  document.getElementById('kpis').innerHTML = `
    <div class="kpi"><div class="kpi-label">Productos</div><div class="kpi-value">16</div><div class="kpi-sub">en 4 colecciones</div></div>
    <div class="kpi"><div class="kpi-label">Ventas registradas</div><div class="kpi-value">${totalVentas}</div><div class="kpi-sub">unidades vendidas</div></div>
    <div class="kpi"><div class="kpi-label">Ingresos totales</div><div class="kpi-value">${totalIngresos>0?COP(totalIngresos):'—'}</div><div class="kpi-sub">sobre ventas activas</div></div>
    <div class="kpi"><div class="kpi-label">Margen promedio</div><div class="kpi-value">${PCT(avgMargin)}</div><div class="kpi-sub">sobre precio de venta</div></div>
  `;
  document.getElementById('winner-wrap').innerHTML = `
    <div class="winner">
      <div class="winner-crown">✦</div>
      <div class="winner-info">
        <div class="winner-tag">Producto más ganador</div>
        <div class="winner-name">${winner.name}</div>
        <div class="winner-stats">
          <div><div class="ws-label">Margen por unidad</div><div class="ws-val">${COP(winner.margen)}</div></div>
          <div><div class="ws-label">Margen %</div><div class="ws-val">${PCT(winner.pct)}</div></div>
          <div><div class="ws-label">Precio venta</div><div class="ws-val">${COP(winner.pv)}</div></div>
          <div><div class="ws-label">Colección</div><div class="ws-val">${winner.collName}</div></div>
        </div>
      </div>
    </div>
  `;
}

// ── Cards ─────────────────────────────────────────────────────────────────
let activeFilter = 'all', activeSort = 'default';

function renderCards() {
  const grid = document.getElementById('grid');
  grid.querySelectorAll('.card').forEach(c=>c.remove());
  let data = [...products];
  if (activeFilter !== 'all') data = data.filter(p=>p.coll===activeFilter);
  if (activeSort==='margin_desc') data.sort((a,b)=>b.pct-a.pct);
  else if (activeSort==='price_desc') data.sort((a,b)=>b.pv-a.pv);
  else if (activeSort==='ganancia_desc') data.sort((a,b)=>b.margen-a.margen);
  else if (activeSort==='ventas_desc') data.sort((a,b)=>getTotalVentas(b.id)-getTotalVentas(a.id));

  data.forEach(p => {
    const stock = getStockRemaining(p);
    const vCnt  = getTotalVentas(p.id);
    const isWinner = p.id === winner.id;
    const barW  = Math.min(100, Math.round(p.pct*100));
    let stockLabel, stockClass='';
    if (stock === null) { stockLabel='Bajo encargo'; }
    else if (stock === 0) { stockLabel='Sin stock'; stockClass='zero'; }
    else if (stock <= 2) { stockLabel=`${stock} disponibles`; stockClass='low'; }
    else { stockLabel=`${stock} disponibles`; }

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.coll = p.coll;
    card.innerHTML = `
      <div class="card-stripe ${p.coll}"></div>
      <div class="card-img-wrap">
        <img src="${p.img}" alt="${p.name}" loading="lazy">
        <div class="card-img-overlay"></div>
        <span class="coll-badge ${p.coll}">${p.collName}</span>
        <span class="stock-badge ${stockClass}">${stockLabel}</span>
      </div>
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-note">${p.note}</div>
        <div class="card-prices">
          <div class="price-box"><div class="pb-label">Costo</div><div class="pb-val">${COP(p.costo)}</div></div>
          <div class="price-box hl"><div class="pb-label">Precio venta</div><div class="pb-val">${COP(p.pv)}</div></div>
        </div>
        <div class="margin-header">
          <span class="margin-label">Margen bruto</span>
          <span class="margin-pct">${COP(p.margen)} · ${PCT(p.pct)}</span>
        </div>
        <div class="margin-bar-bg"><div class="margin-bar-fill ${p.coll}" style="width:${barW}%"></div></div>
        <div class="card-footer">
          <span>Ventas: <strong>${vCnt > 0 ? vCnt+' uds.' : 'ninguna aún'}</strong></span>
          ${isWinner ? '<span class="winner-chip">✦ Más rentable</span>' : `<span class="ventas-chip ${vCnt>0?'has':''}">${vCnt>0?'Ver pedidos':'Registrar venta'}</span>`}
        </div>
      </div>
    `;
    card.addEventListener('click', () => openModal(p.id));
    grid.appendChild(card);
  });
}

// ── Status helpers ────────────────────────────────────────────────────────
const STATUS_CLASS = {'Recibido':'s-recibido','En preparación':'s-preparacion','Enviado':'s-enviado','Entregado':'s-entregado','Cancelado':'s-cancelado'};
const STATUS_ICON  = {'Recibido':'📋','En preparación':'🔧','Enviado':'📦','Entregado':'✅','Cancelado':'❌'};

// ── Modal ─────────────────────────────────────────────────────────────────
let currentPid = null;

function openModal(pid) {
  currentPid = pid;
  const p = products.find(x=>x.id===pid);
  const stock = getStockRemaining(p);

  document.getElementById('mImg').src = p.img;
  document.getElementById('mColl').textContent = p.collName;
  document.getElementById('mName').textContent = p.name;

  document.getElementById('mMeta').innerHTML = `
    <div class="mm-item"><div class="mm-l">Costo producción</div><div class="mm-v">${COP(p.costo)}</div></div>

function renderSalesTable(pid) {
  const sales = getSalesForProduct(pid);

  if (sales.length === 0) {
    cont.innerHTML = `<div class="empty-state"><div class="es-icon">📦</div><p>Aún no hay ventas registradas para este producto.<br>¡Pulsa <strong>Nueva Venta</strong> para registrar el primer pedido!</p></div>`;

  }

  const rows = sales.map((s,i) => `
    <tr>
      <td class="muted">#${String(i+1).padStart(2,'0')}</td>
      <td>${fmtDate(s.fecha)}</td>
      <td><strong>${s.nombre||'—'}</strong></td>
      <td class="muted">${s.telefono||'—'}</td>

      <td>${s.direccion||'—'}</td>

        </select>
      </td>
      <td>${s.notas?`<span title="${s.notas}" style="cursor:help">📝</span>`:'—'}</td>
      <td><button class="btn-sm btn-danger" onclick="deleteSale(${pid},${i})">✕</button></td>
    </tr>
  `).join('');

  cont.innerHTML = `
    <div class="tbl-wrap">

        <thead><tr>
          <th>#</th><th>Fecha</th><th>Cliente</th><th>Teléfono</th><th>Correo</th><th>Dirección</th><th>Canal</th><th>Pago</th><th>Cant.</th><th>Estado envío</th><th>Notas</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function updateStatus(pid, idx, newStatus) {
  const data = loadSales();
  if (!data[pid]) return;
  data[pid][idx].estado = newStatus;
  saveSales(data);
  // refresh modal meta (stock might change)
  openModal(pid);
  renderCards();
  renderKPIs();
}

function deleteSale(pid, idx) {
  if (!confirm('¿Eliminar este pedido?')) return;
  const data = loadSales();
  if (!data[pid]) return;
  data[pid].splice(idx, 1);
  saveSales(data);
  openModal(pid);
  renderCards();
  renderKPIs();
}

function getAllCustomers() {
  const data = loadSales();
  const map = {};
  products.forEach(p => {
    (data[p.id] || []).forEach(s => {
      if (!s.correo) return;
      const key = s.correo.toLowerCase().trim();
      if (!map[key]) map[key] = {nombre: s.nombre||'', correo: key, pedidos: [], estados: []};
      map[key].pedidos.push({producto: p.name, estado: s.estado, fecha: s.fecha, cantidad: s.cantidad||1});
      if (!map[key].estados.includes(s.estado)) map[key].estados.push(s.estado);
    });
  });
  return Object.values(map);
}

function filterCustomersByStatus(status) {
  if (status === 'todos') return getAllCustomers();
  return getAllCustomers().filter(c => c.estados.includes(status));
}

const GASTOS_KEY = 'ryb_gastos_v1';
const META_KEY   = 'ryb_meta_v1';

function loadGastos(){ try{ return JSON.parse(localStorage.getItem(GASTOS_KEY))||[]; }catch(e){ return []; } }
function saveGastos(d){ localStorage.setItem(GASTOS_KEY, JSON.stringify(d)); }
function loadMeta(){ return parseInt(localStorage.getItem(META_KEY))||5000000; }
function saveMeta(v){ localStorage.setItem(META_KEY, v); }

function getSalesForMonth(yr, mo) {
  const data = loadSales(); let rows = [];
  products.forEach(p => {
    (data[p.id]||[]).forEach(s => {
      if (!s.fecha) return;
      const d = new Date(s.fecha+'T12:00:00');
      if (d.getFullYear()===yr && d.getMonth()===mo)
        rows.push({...s, product: p, ingresos: p.pv*(s.cantidad||1), costo: p.costo*(s.cantidad||1)});
    });
  });
  return rows.filter(s => s.estado !== 'Cancelado');
}

    <div class="fin-cols">
      <div class="fin-panel">
        <div class="fin-panel-header">
          <span class="fin-panel-title">Gastos adicionales</span>
          <button class="btn-copy-all" onclick="openGastoForm()">＋ Registrar gasto</button>
        </div>
        <div id="gastosList">
          ${gastos.length===0
            ? `<div style="text-align:center;padding:32px 20px;color:var(--muted);font-size:.82rem;">Sin gastos registrados este mes.</div>`
            : gastos.map((g,i)=>`<div class="gasto-row">
                <span class="gasto-cat">${g.categoria}</span>
                <span class="gasto-desc">${g.descripcion||'—'}</span>
                <span class="gasto-date">${fmtDate(g.fecha)}</span>
                <span class="gasto-monto">-${COP(g.monto)}</span>
                <button class="gasto-del" onclick="deleteGasto(${g.id})">✕</button>
              </div>`).join('')
          }
        </div>
      </div>

      <div class="fin-panel">
        <div class="fin-panel-header"><span class="fin-panel-title">Ventas por canal</span></div>
        ${Object.keys(canalMap).length===0
          ? `<div style="text-align:center;padding:32px 20px;color:var(--muted);font-size:.82rem;">Sin ventas este mes.</div>`
          : Object.entries(canalMap).sort((a,b)=>b[1]-a[1]).map(([canal,cnt])=>`
            <div class="canal-bar-row">
              <span class="canal-bar-label">${canal}</span>
              <div class="canal-bar-bg"><div class="canal-bar-f" style="width:${Math.round(cnt/totalUnits*100)}%;background:${CANAL_COLORS[canal]||'#90A4AE'};"></div></div>
              <span class="canal-bar-val">${cnt} ud${cnt!==1?'s':''}.</span>
            </div>`).join('')
        }
        ${Object.keys(canalMap).length>0?`<div style="padding:8px 18px 14px;font-size:.7rem;color:var(--muted);">Total: ${totalUnits} unidad${totalUnits!==1?'es':''} vendida${totalUnits!==1?'s':''}</div>`:''}
      </div>
    </div>
  `;

  document.getElementById('mesSel').addEventListener('change', e => {
    const [yr,mo] = e.target.value.split('-').map(Number);
    wrap.dataset.yr = yr; wrap.dataset.mo = mo;
    renderFinanzas();
  });
}

function editMeta() {
  const actual = loadMeta();
  const val = prompt(`Meta mensual de ingresos (COP):\nActual: ${COP(actual)}`, actual);
  if (val && !isNaN(parseInt(val.replace(/\D/g,'')))) {
    saveMeta(parseInt(val.replace(/\D/g,'')));
    renderFinanzas();
  }
}
window.editMeta = editMeta;

function openGastoForm() {
  const cats = ['Empaque','Envío','Publicidad','Feria/Stand','Insumos','Herramientas','Otro'];
  const html = `
    <div id="gastoOverlay" style="position:fixed;inset:0;background:rgba(30,15,5,.6);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;">
      <div style="background:#fff;border-radius:18px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 20px 60px rgba(30,15,5,.3);">
        <div style="background:var(--brown);padding:18px 22px;display:flex;justify-content:space-between;align-items:center;">
          <span style="font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;color:var(--cream);">Registrar Gasto</span>
          <button onclick="document.getElementById('gastoOverlay').remove()" style="background:rgba(255,255,255,.12);border:none;color:var(--cream);font-size:1rem;width:28px;height:28px;border-radius:50%;cursor:pointer;">✕</button>
        </div>
        <div style="padding:20px 22px;display:grid;grid-template-columns:1fr 1fr;gap:13px;">
          <div class="form-group"><label>Fecha</label><input type="date" id="gFecha" value="${new Date().toISOString().split('T')[0]}"></div>
          <div class="form-group"><label>Monto (COP)</label><input type="number" id="gMonto" placeholder="0" min="0"></div>
          <div class="form-group"><label>Categoría</label><select id="gCat">${cats.map(c=>`<option>${c}</option>`).join('')}</select></div>
          <div class="form-group full" style="grid-column:1/-1"><label>Descripción</label><input type="text" id="gDesc" placeholder="ej: bolsas para empaque, pauta Instagram..."></div>
        </div>
        <div style="padding:0 22px 20px;display:flex;gap:10px;justify-content:flex-end;">
          <button class="btn-secondary" onclick="document.getElementById('gastoOverlay').remove()">Cancelar</button>
          <button class="btn-primary" onclick="saveGasto()">Guardar</button>
        </div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}
window.openGastoForm = openGastoForm;

function saveGasto() {
  const monto = parseInt(document.getElementById('gMonto').value)||0;
  if (monto <= 0) { alert('Ingresa un monto válido.'); return; }
  const gastos = loadGastos();
  gastos.push({ id: Date.now(), fecha: document.getElementById('gFecha').value, monto, categoria: document.getElementById('gCat').value, descripcion: document.getElementById('gDesc').value.trim() });
  saveGastos(gastos);
  document.getElementById('gastoOverlay').remove();
  renderFinanzas();
  renderKPIs();
}
window.saveGasto = saveGasto;

function deleteGasto(id) {
  if (!confirm('¿Eliminar este gasto?')) return;
  saveGastos(loadGastos().filter(g=>g.id!==id));
  renderFinanzas();
  renderKPIs();
}
window.deleteGasto = deleteGasto;

// ── Ferias ────────────────────────────────────────────────────────────────
const FERIAS_KEY = 'ryb_ferias_v1';
function loadFerias(){ try{ return JSON.parse(localStorage.getItem(FERIAS_KEY))||[]; }catch(e){ return []; } }
function saveFerias(d){ localStorage.setItem(FERIAS_KEY, JSON.stringify(d)); }

function getFeriaVentas(feria) {
  const data = loadSales(); let total=0, unidades=0;
  products.forEach(p => {
    (data[p.id]||[]).forEach(s => {
      if (s.canal==='Feria' && s.estado!=='Cancelado' && s.fecha===feria.fecha) {
        total += p.pv*(s.cantidad||1);
        unidades += (s.cantidad||1);
      }
    });
  });
  return { total, unidades };
}

function renderFerias() {
  const wrap = document.getElementById('tabFerias');
  const ferias = loadFerias().sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));

  wrap.innerHTML = `
    <div style="margin-top:24px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <div class="email-section-title" style="margin:0;">Ferias &amp; Eventos</div>
      <button class="btn-primary" onclick="openFeriaForm()">＋ Registrar Feria</button>
    </div>
    ${ferias.length===0
      ? `<div style="text-align:center;padding:60px 20px;color:var(--muted);">
           <div style="font-size:3rem;margin-bottom:12px;">🎪</div>
           <p>Aún no has registrado ferias.<br><span style="font-size:.8rem;">Registra tu primera participación para ver el ROI.</span></p>
         </div>`
      : `<div class="ferias-grid">${ferias.map(f => {
          const v = getFeriaVentas(f);
          const roi = v.total - f.costo_stand;
          return `<div class="feria-card">
            <div class="feria-stripe"></div>
            <div class="feria-body">
              <div class="feria-name">${f.nombre}</div>
              <div class="feria-meta">📅 ${fmtDate(f.fecha)} &nbsp;·&nbsp; 📍 ${f.ciudad||'—'}</div>
              <div class="feria-stats">
                <div class="feria-stat"><div class="fs-l">Costo stand</div><div class="fs-v neg">-${COP(f.costo_stand)}</div></div>
                <div class="feria-stat"><div class="fs-l">Ventas (canal Feria)</div><div class="fs-v">${v.total>0?COP(v.total):'sin registrar'}</div></div>
                <div class="feria-stat"><div class="fs-l">ROI</div><div class="fs-v ${roi>=0?'pos':'neg'}">${v.total>0?COP(roi):'—'}</div></div>
              </div>
              ${f.notas?`<div class="feria-notas" style="margin-top:10px;">${f.notas}</div>`:''}
            </div>
            <div class="feria-foot">
              <button class="btn-sm btn-danger" onclick="deleteFeria(${f.id})">Eliminar</button>
              ${v.total===0?`<span style="font-size:.7rem;color:var(--muted);align-self:center;">💡 Registra ventas con canal "Feria" en esa fecha para ver ROI</span>`:''}
            </div>
          </div>`;
        }).join('')}</div>`
    }
  `;
}

function openFeriaForm() {
  const html = `
    <div id="feriaOverlay" style="position:fixed;inset:0;background:rgba(30,15,5,.6);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;">
      <div style="background:#fff;border-radius:18px;width:100%;max-width:460px;overflow:hidden;box-shadow:0 20px 60px rgba(30,15,5,.3);">
        <div style="background:var(--brown);padding:18px 22px;display:flex;justify-content:space-between;align-items:center;">
          <span style="font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;color:var(--cream);">Registrar Feria</span>
          <button onclick="document.getElementById('feriaOverlay').remove()" style="background:rgba(255,255,255,.12);border:none;color:var(--cream);font-size:1rem;width:28px;height:28px;border-radius:50%;cursor:pointer;">✕</button>
        </div>
        <div style="padding:20px 22px;display:grid;grid-template-columns:1fr 1fr;gap:13px;">
          <div class="form-group full" style="grid-column:1/-1"><label>Nombre de la feria</label><input type="text" id="ffNombre" placeholder="ej: Feria del Diseño Bogotá"></div>
          <div class="form-group"><label>Fecha</label><input type="date" id="ffFecha" value="${new Date().toISOString().split('T')[0]}"></div>
          <div class="form-group"><label>Ciudad</label><input type="text" id="ffCiudad" placeholder="Bogotá, Medellín..."></div>
          <div class="form-group full" style="grid-column:1/-1"><label>Costo del stand (COP)</label><input type="number" id="ffCosto" placeholder="0" min="0"></div>
          <div class="form-group full" style="grid-column:1/-1"><label>Notas</label><textarea id="ffNotas" style="font-family:'Inter',sans-serif;font-size:.85rem;padding:9px 12px;border:1.5px solid rgba(139,115,85,.2);border-radius:9px;outline:none;color:var(--brown);width:100%;resize:vertical;min-height:60px;" placeholder="Tipo de público, lo que funcionó, lo que no..."></textarea></div>
        </div>
        <div style="padding:0 22px 20px;display:flex;gap:10px;justify-content:flex-end;">
          <button class="btn-secondary" onclick="document.getElementById('feriaOverlay').remove()">Cancelar</button>
          <button class="btn-primary" onclick="saveFeria()">Guardar</button>
        </div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}
window.openFeriaForm = openFeriaForm;

function saveFeria() {
  const nombre = document.getElementById('ffNombre').value.trim();
  if (!nombre) { alert('Ingresa el nombre de la feria.'); return; }
  const ferias = loadFerias();
  ferias.push({ id: Date.now(), nombre, fecha: document.getElementById('ffFecha').value, ciudad: document.getElementById('ffCiudad').value.trim(), costo_stand: parseInt(document.getElementById('ffCosto').value)||0, notas: document.getElementById('ffNotas').value.trim() });
  saveFerias(ferias);
  document.getElementById('feriaOverlay').remove();
  renderFerias();
}
window.saveFeria = saveFeria;

function deleteFeria(id) {
  if (!confirm('¿Eliminar esta feria?')) return;
  saveFerias(loadFerias().filter(f=>f.id!==id));
  renderFerias();
}
window.deleteFeria = deleteFeria;

// ── Init ──────────────────────────────────────────────────────────────────
renderKPIs();
renderCards();
</script>
